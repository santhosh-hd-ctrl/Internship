# Server
server.port=8080
server.servlet.context-path=/api

# Database (H2 for dev, switch to MySQL for prod)
spring.datasource.url=jdbc:h2:mem:smarthospitaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=SANthu@8095
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL (uncomment for production)
# spring.datasource.url=jdbc:mysql://localhost:3306/smarthospital?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=SmartHospitalSecretKey2024VeryLongAndSecureKeyForJWTTokenGeneration
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Mail (configure with real SMTP for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.simulation=true

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Pagination
app.pagination.default-page-size=10
app.pagination.max-page-size=50

# Scheduler
app.scheduler.reminder-minutes-before=30

# Logging
logging.level.com.smarthospital=DEBUG
logging.level.org.springframework.security=INFO
