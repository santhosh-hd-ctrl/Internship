version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smarthospital-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smarthospital
      MYSQL_USER: smarthospital
      MYSQL_PASSWORD: smarthospital123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smarthospital-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smarthospital?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: smarthospital
      SPRING_DATASOURCE_PASSWORD: smarthospital123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      APP_JWT_SECRET: ProductionJWTSecretKeyChangeThisInProductionEnvironment2024
      APP_MAIL_SIMULATION: "true"
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smarthospital-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
