spring.application.name=codearena-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/codearena_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=SANthu@8095
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=codearena_super_secret_key_2024_do_not_share_in_production_use_env_vars
jwt.expiration=86400000

# Server
server.port=8080
server.error.include-message=always

# Logging
logging.level.com.codearena=DEBUG
logging.level.org.springframework.security=WARN

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Code Execution
codearena.execution.timeout-seconds=10
codearena.execution.temp-dir=/tmp/codearena

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
